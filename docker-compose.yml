name: atlantia

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      RUN_OPTIMIZE: "false"
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - atlantia

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - atlantia

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    env_file:
      - .env
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    volumes:
      - .:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - atlantia

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    env_file:
      - .env
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - atlantia

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-this-local-root-password}
      MYSQL_DATABASE: atlantia
      MYSQL_USER: atlantia
      MYSQL_PASSWORD: ${ATLANTIA_DB_PASSWORD:-change-this-local-db-password}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-change-this-local-meilisearch-key}
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-change-this-local-minio-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  ml-api:
    build:
      context: ./ml-service
      dockerfile: docker/Dockerfile.api
    env_file:
      - ./ml-service/.env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  ml-worker:
    build:
      context: ./ml-service
      dockerfile: docker/Dockerfile.worker
    env_file:
      - ./ml-service/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - atlantia

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - atlantia

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: atlantia_admin_dev
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - atlantia

volumes:
  composer-cache:
  mysql-data:
  redis-data:
  meili-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  atlantia:
    driver: bridge
