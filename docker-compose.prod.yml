name: atlantia-prod

services:
  app:
    image: ${REGISTRY_IMAGE}/marketplace:${APP_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/atlantia/shared/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "true"
      RUN_OPTIMIZE: "true"
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlantia

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - /opt/atlantia/current:/var/www/html:ro
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - atlantia

  worker:
    image: ${REGISTRY_IMAGE}/marketplace:${APP_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/atlantia/shared/.env
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --max-time=3600
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - atlantia

  scheduler:
    image: ${REGISTRY_IMAGE}/marketplace:${APP_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/atlantia/shared/.env
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - atlantia

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - /opt/atlantia/shared/.env.mysql
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlantia

  ml-api:
    image: ${REGISTRY_IMAGE}/ml-api:${APP_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/atlantia/shared/.env.ml
    depends_on:
      - redis
    networks:
      - atlantia

  ml-worker:
    image: ${REGISTRY_IMAGE}/ml-worker:${APP_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/atlantia/shared/.env.ml
    depends_on:
      - redis
    networks:
      - atlantia

volumes:
  app-storage:
  mysql-data:
  redis-data:
  meili-data:

networks:
  atlantia:
    driver: bridge
